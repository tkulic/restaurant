<div class='header header-absolute'>
  <div class="container">
    <div class="logo">
      <a href="javascript:void(0);"><img height={{ .Site.Params.logo.desktop_height }} width={{ .Site.Params.logo.desktop_width }} alt="{{ .Site.Params.logo.alt }}" src="{{ .Site.Params.logo.desktop | relURL }}" /></a>
    </div>
    <div class="logo-mobile">
      <a href="{{ .Site.BaseURL }}"><img height={{ .Site.Params.logo.mobile_height }} width={{ .Site.Params.logo.mobile_width }} alt="{{ .Site.Params.logo.alt }}" src="{{ .Site.Params.logo.mobile | relURL }}" /></a>
    </div>
    {{ partial "main-menu.html" . }}
    <div style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
      <a href="javascript:void(0);" style="text-decoration: none; opacity: 0.7;" title="Hrvatski">
        <img src="{{ "images/flags/hr.svg" | relURL }}" alt="Croatian" width="24" height="24" style="border-radius: 2px;">
      </a>
      <a href="javascript:void(0);" style="text-decoration: none; opacity: 0.7;" title="English">
        <img src="{{ "images/flags/en.svg" | relURL }}" alt="English" width="24" height="24" style="border-radius: 2px;">
      </a>
    </div>
    {{ partial "hamburger.html" . }}
  </div>
</div>
